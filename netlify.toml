# Next.js on Netlify — https://docs.netlify.com/frameworks/next-js/overview/
#
# Netlify 프로젝트: counselingpl
# Site ID: d15eb760-0825-45b4-9c9c-4c4d1f22f2ef
# GitHub: https://github.com/yhs1780-arch/counseling (branch: main)
# 대시보드에서 Build & deploy → Link repository 로 위 저장소를 연결하면 자동 배포됩니다.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# 배포 후 Netlify 환경 변수: DATABASE_URL, COUNSELOR_JWT_SECRET, (선택) COUNSELOR_SEED_*
# 상담사 계정은 DB에 있어야 로그인됨. 첫 배포 후 DB에 대해 db push + db:seed 실행 또는 CI에 seed 단계 추가.
# 서버리스에서는 SQLite 대신 호스티드 PostgreSQL 등을 사용하세요. 로컬은 DATABASE_URL=file:./dev.db → prisma/dev.db
